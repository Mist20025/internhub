server:
  port: 8091

spring:
  application:
    name: internhub

  # ========== 数据源配置 ==========
  # 默认使用 H2 内存数据库（开发时无需安装 MySQL）
  # 切换到 MySQL 时，修改 spring.profiles.active 为 mysql
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:internhub;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # H2 控制台（开发时可访问 localhost:8080/h2-console 查看数据库）
  h2:
    console:
      enabled: true
      path: /h2-console

  # 启动时执行建表 SQL
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# ========== MyBatis 配置 ==========
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.internhub.entity
  configuration:
    map-underscore-to-camel-case: true  # 数据库下划线字段自动映射为 Java 驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出到控制台

# ========== JWT 配置 ==========
jwt:
  secret: internhub-jwt-secret-key-2026-summer-internship-project
  expiration: 86400000  # Token 有效期：24小时（毫秒）

# ========== Knife4j API 文档 ==========
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs
